syntax = "proto3";

package lumenlog;

option go_package = "lumenlog/proto/gen";

message LogEvent {
  string service_name = 1;
  string host = 2;
  string level = 3;
  string message = 4;
  int64 timestamp = 5;
  map<string, string> metadata = 6;
  string user_id = 7;
  string attack_type = 8;
  string action = 9;
}