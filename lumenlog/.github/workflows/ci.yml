name: LumenLog CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  go-services:
    name: Go Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: go mod download

      - name: Build Ingestor
        run: go build ./cmd/ingestor

      - name: Build Alerter
        run: go build ./cmd/alerter

  rust-agent:
    name: Rust Agent
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libprotobuf-dev \
            pkg-config \
            libssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libcurl4-openssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tests
        run: cargo test

      - name: Build Agent
        run: cargo build --release