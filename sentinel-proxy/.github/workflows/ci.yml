name: Sentinel Platform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Dependencies
        run: go mod download

      - name: Verify Build
        run: go build ./...

      - name: Run Tests
        run: go test ./...