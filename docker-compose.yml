services:

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentinel-net

  idp:
    build: ./zero-trust-idp
    container_name: idp
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/sentinel?sslmode=disable
    depends_on:
      - db
    networks:
      - sentinel-net

  proxy:
    build: ./sentinel-proxy
    container_name: sentinel-proxy
    ports:
      - "8081:8081"
    environment:
      - IDP_URL=http://idp:8080
      - TARGET_URL=http://idp:8080
    depends_on:
      - idp
    networks:
      - sentinel-net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    networks:
      - sentinel-net

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: lumen_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: lumenlog2026
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./lumenlog/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentinel-net

  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    depends_on:
      - redpanda
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      rpk topic create logs-raw --brokers=redpanda:9092;
      rpk topic create security-events --brokers=redpanda:9092;
      "
    networks:
      - sentinel-net

  ingestor:
    build:
      context: ./lumenlog
      dockerfile: ./cmd/ingestor/Dockerfile
    container_name: lumen-ingestor
    depends_on:
      - redpanda
      - clickhouse
      - topic-init
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=lumen_db
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=lumenlog2026
    networks:
      - sentinel-net

  alerter:
    build:
      context: ./lumenlog
      dockerfile: ./cmd/alerter/Dockerfile
    container_name: lumen-alerter
    depends_on:
      - redpanda
      - topic-init
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
    networks:
      - sentinel-net

  agent:
    build:
      context: ./lumenlog
      dockerfile: ./agent/Dockerfile
    container_name: lumen-agent
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKERS=redpanda:9092
    ports:
      - "7777:7777"
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge
    name: sentinel-net

volumes:
  postgres_data:
  clickhouse_data: